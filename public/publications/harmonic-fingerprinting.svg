<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">Harmonic fingerprinting for foreign-object detection in mobile wireless charging</title>
  <desc id="desc">A mobile phone and metal object above a wireless charger, followed by harmonic sensing and classification.</desc>
  <defs>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eef5ff"/><stop offset="1" stop-color="#d6e6ff"/></linearGradient>
    <linearGradient id="coil" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d66d0"/><stop offset="1" stop-color="#78b1ff"/></linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0l10 5-10 5z" fill="#647181"/></marker>
  </defs>
  <rect width="920" height="470" fill="#fff"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#101820">
    <text x="156" y="52" text-anchor="middle" font-size="22" font-weight="700">Charging scene</text>
    <text x="460" y="52" text-anchor="middle" font-size="22" font-weight="700">Harmonic fingerprint</text>
    <text x="772" y="52" text-anchor="middle" font-size="22" font-weight="700">Early detection</text>
  </g>
  <g transform="translate(55 83)">
    <rect x="28" y="0" width="150" height="238" rx="22" fill="url(#phone)" stroke="#101820" stroke-width="5"/>
    <rect x="45" y="25" width="116" height="172" rx="10" fill="#fff" stroke="#9bb5d1" stroke-width="3"/>
    <rect x="81" y="10" width="44" height="5" rx="2.5" fill="#101820"/>
    <path d="M91 96h24l-14 31h22l-37 45 11-34H75z" fill="#0d66d0"/>
    <ellipse cx="103" cy="295" rx="100" ry="34" fill="#e8eef2" stroke="#101820" stroke-width="5"/>
    <ellipse cx="103" cy="287" rx="70" ry="21" fill="none" stroke="url(#coil)" stroke-width="9"/>
    <ellipse cx="103" cy="287" rx="43" ry="12" fill="none" stroke="#7fb4ec" stroke-width="6"/>
    <g transform="translate(174 220) rotate(18)">
      <circle r="29" fill="#e4b647" stroke="#916c13" stroke-width="5"/>
      <circle r="17" fill="none" stroke="#f8d77f" stroke-width="3"/>
    </g>
    <path d="M70 260c-22-44-18-76 2-103M103 250c-17-54-13-91 0-120M136 260c22-44 18-76-2-103" fill="none" stroke="#4793e8" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 10"/>
    <text x="103" y="356" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#647181">metal object alters the field</text>
  </g>
  <path d="M295 238h72" fill="none" stroke="#647181" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(382 88)">
    <rect width="178" height="282" rx="8" fill="#f5f7f9" stroke="#b6c1ca" stroke-width="3"/>
    <line x1="26" y1="237" x2="155" y2="237" stroke="#9aa8b3" stroke-width="2"/>
    <line x1="26" y1="32" x2="26" y2="237" stroke="#9aa8b3" stroke-width="2"/>
    <g fill="#0d66d0"><rect x="39" y="67" width="16" height="170"/><rect x="72" y="118" width="16" height="119"/><rect x="105" y="157" width="16" height="80"/><rect x="138" y="187" width="16" height="50"/></g>
    <g fill="#ef7b45"><rect x="47" y="82" width="8" height="155"/><rect x="80" y="151" width="8" height="86"/><rect x="113" y="194" width="8" height="43"/><rect x="146" y="217" width="8" height="20"/></g>
    <text x="90" y="267" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#647181">frequency harmonics</text>
    <circle cx="149" cy="26" r="7" fill="#0d66d0"/><text x="135" y="31" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#647181">clear</text>
    <circle cx="149" cy="47" r="7" fill="#ef7b45"/><text x="135" y="52" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#647181">metal</text>
  </g>
  <path d="M579 238h72" fill="none" stroke="#647181" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(666 92)">
    <rect width="214" height="270" rx="14" fill="#f5f7f9" stroke="#b6c1ca" stroke-width="3"/>
    <g transform="translate(34 33)" fill="none" stroke="#0d66d0" stroke-width="4"><rect width="58" height="58" rx="8"/><path d="M14 19h30M14 30h23M14 41h17"/></g>
    <path d="M103 61h46" fill="none" stroke="#647181" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(157 31)"><circle cx="25" cy="31" r="29" fill="#dcedff" stroke="#0d66d0" stroke-width="4"/><path d="M10 32l10 10 21-24" fill="none" stroke="#0d66d0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></g>
    <rect x="27" y="124" width="160" height="74" rx="8" fill="#fff" stroke="#101820" stroke-width="3"/>
    <text x="107" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#101820">Foreign object</text>
    <text x="107" y="180" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#647181">detected early</text>
    <text x="107" y="236" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#647181">sensing coil array + model</text>
  </g>
</svg>
